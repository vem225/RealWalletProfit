<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>RealWalletProfit</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .app-title h1 {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, #2a7f6e, #4c9f8f);
            -webkit-background-clip: text; color: transparent;
        }
        .app-title p { font-size: 13px; color: var(--tg-theme-hint-color, #8e8e93); }

        /* Контейнер для кнопки TON Connect */
        #ton-connect-button { display: flex; justify-content: flex-end; }

        .balance-card {
            background-color: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 24px; padding: 24px 20px; margin-bottom: 20px; text-align: center;
        }
        .balance-label { font-size: 14px; color: var(--tg-theme-hint-color, #8e8e93); margin-bottom: 8px; text-transform: uppercase;}
        .balance-amount { font-size: 42px; font-weight: 800; line-height: 1.2; }
        
        .profit-badge {
            display: inline-block; padding: 6px 12px; border-radius: 12px;
            font-size: 16px; font-weight: 600; margin-top: 10px;
        }
        .positive { background-color: rgba(52, 199, 89, 0.15); color: #34c759; }
        .negative { background-color: rgba(255, 59, 48, 0.15); color: #ff3b30; }

        .assets-header { font-size: 18px; font-weight: 600; margin-bottom: 16px; margin-top: 20px; display: flex; justify-content: space-between;}
        
        .asset-list {
            background-color: var(--tg-theme-secondary-bg-color, #f8f8f8);
            border-radius: 20px; overflow: hidden; margin-bottom: 28px;
        }
        .asset-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; border-bottom: 1px solid var(--tg-theme-separator-color, rgba(0,0,0,0.05));
        }
        .asset-item:last-child { border-bottom: none; }
        
        .asset-info { display: flex; flex-direction: column; gap: 4px; }
        .asset-name { font-weight: 600; font-size: 16px; text-transform: uppercase; }
        .asset-amount { font-size: 13px; color: var(--tg-theme-hint-color, #8e8e93); }
        
        .asset-financials { text-align: right; display: flex; flex-direction: column; gap: 4px; }
        .asset-value { font-weight: 600; font-size: 16px; }
        .asset-pnl { font-size: 13px; font-weight: 500;}
        .pnl-pos { color: #34c759; }
        .pnl-neg { color: #ff3b30; }

        .btn {
            width: 100%; background-color: var(--tg-theme-button-color, #2a7f6e);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 14px; padding: 14px 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }

        /* Модальное окно */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: flex-end;
        }
        .modal-content {
            background-color: var(--tg-theme-bg-color, #ffffff); width: 100%;
            border-radius: 24px 24px 0 0; padding: 24px 20px; padding-bottom: 40px;
        }
        .modal-title { font-size: 20px; font-weight: 600; margin-bottom: 16px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 14px; color: var(--tg-theme-hint-color, #8e8e93); margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid var(--tg-theme-separator-color, #e0e0e0);
            background-color: var(--tg-theme-secondary-bg-color, #f8f8f8);
            color: var(--tg-theme-text-color, #000); font-size: 16px; outline: none;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .btn-cancel { background-color: var(--tg-theme-secondary-bg-color, #e9e9ef); color: var(--tg-theme-text-color, #000); }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="app-title">
            <h1>RealWalletProfit</h1>
            <p>Истинный PnL</p>
        </div>
        <div id="ton-connect-button"></div>
    </div>

    <div class="balance-card">
        <div class="balance-label">Текущий баланс</div>
        <div class="balance-amount" id="totalBalance">$0.00</div>
        <div class="profit-badge" id="totalProfit">Загрузка...</div>
    </div>

    <div class="assets-header">
        <span>Мой портфель</span>
    </div>
    <div class="asset-list" id="assetList">
        <div style="padding: 16px; text-align: center; color: gray;">Загрузка активов...</div>
    </div>

    <button class="btn" id="openModalBtn">➕ Добавить актив вручную</button>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <div class="modal-title">Новый актив</div>
        
        <div class="input-group">
            <label>ID монеты (например: tether-gold, bitcoin, the-open-network)</label>
            <input type="text" id="coinIdInput" placeholder="tether-gold">
        </div>
        
        <div class="input-group">
            <label>Количество монет</label>
            <input type="number" id="coinAmountInput" placeholder="0.5" step="any">
        </div>

        <div class="input-group">
            <label>Всего потрачено ($ USD)</label>
            <input type="number" id="coinSpentInput" placeholder="1000" step="any">
        </div>

        <div class="modal-buttons">
            <button class="btn btn-cancel" id="closeModalBtn">Отмена</button>
            <button class="btn" id="saveAssetBtn">Добавить</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Инициализация TON Connect
    // В манифесте указывается ссылка на JSON файл с описанием твоего приложения. 
    // Для тестов можно использовать этот моковый манифест, но для продакшена его нужно будет залить на твой GitHub/сервер.
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://ton-connect.github.io/demo-dapp-with-react-ui/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // Отслеживаем подключение кошелька
    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            console.log('Кошелек подключен:', wallet.account.address);
            tg.showAlert('TON Кошелек успешно подключен! (Чтение баланса добавим позже)');
            // TODO: Здесь будем делать запрос в блокчейн TON для получения баланса токенов
        }
    });

    // --- Логика Портфеля ---

    // Загружаем данные из памяти телефона или создаем пустой массив
    let myPortfolio = JSON.parse(localStorage.getItem('userPortfolio')) || [];

    const formatMoney = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);

    async function updatePortfolio() {
        const assetListEl = document.getElementById('assetList');
        
        if (myPortfolio.length === 0) {
            assetListEl.innerHTML = '<div style="padding: 16px; text-align: center; color: gray;">Ваш портфель пуст. Добавьте активы!</div>';
            document.getElementById('totalBalance').innerText = '$0.00';
            document.getElementById('totalProfit').innerText = 'Нет данных';
            document.getElementById('totalProfit').className = 'profit-badge';
            return;
        }

        try {
            const coinIds = myPortfolio.map(coin => coin.id).join(',');
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinIds}&vs_currencies=usd`);
            const prices = await response.json();

            let totalCurrentValue = 0;
            let totalInvestedValue = 0;
            assetListEl.innerHTML = ''; 

            myPortfolio.forEach(coin => {
                // Если API не вернул цену (например, неверный ID), ставим 0
                const currentPrice = prices[coin.id] ? prices[coin.id].usd : 0;
                const currentValue = coin.amount * currentPrice;
                const investedValue = coin.investedUSD;
                
                const pnlUSD = currentValue - investedValue;
                const pnlPercent = investedValue > 0 ? ((currentValue / investedValue) - 1) * 100 : 0;

                totalCurrentValue += currentValue;
                totalInvestedValue += investedValue;

                const pnlClass = pnlUSD >= 0 ? 'pnl-pos' : 'pnl-neg';
                const pnlSign = pnlUSD >= 0 ? '+' : '';
                
                assetListEl.innerHTML += `
                    <div class="asset-item">
                        <div class="asset-info">
                            <span class="asset-name">${coin.id.replace(/-/g, ' ')}</span>
                            <span class="asset-amount">${coin.amount} (потрачено $${investedValue})</span>
                        </div>
                        <div class="asset-financials">
                            <span class="asset-value">${formatMoney(currentValue)}</span>
                            <span class="asset-pnl ${pnlClass}">${pnlSign}${formatMoney(pnlUSD)}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('totalBalance').innerText = formatMoney(totalCurrentValue);
            
            const totalPnL = totalCurrentValue - totalInvestedValue;
            const totalProfitEl = document.getElementById('totalProfit');
            
            if (totalPnL >= 0) {
                totalProfitEl.className = 'profit-badge positive';
                totalProfitEl.innerText = `+${formatMoney(totalPnL)} чистой прибыли`;
            } else {
                totalProfitEl.className = 'profit-badge negative';
                totalProfitEl.innerText = `${formatMoney(totalPnL)} убытка`;
            }

        } catch (error) {
            console.error('Ошибка API:', error);
            tg.showAlert('Ошибка загрузки курсов.');
        }
    }

    // --- Логика Модального Окна ---
    const modal = document.getElementById('addModal');
    
    document.getElementById('openModalBtn').addEventListener('click', () => {
        modal.style.display = 'flex';
    });
    
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        modal.style.display = 'none';
    });

    document.getElementById('saveAssetBtn').addEventListener('click', () => {
        const id = document.getElementById('coinIdInput').value.trim().toLowerCase();
        const amount = parseFloat(document.getElementById('coinAmountInput').value);
        const spent = parseFloat(document.getElementById('coinSpentInput').value);

        if (!id || isNaN(amount) || isNaN(spent)) {
            tg.showAlert('Пожалуйста, заполните все поля корректно.');
            return;
        }

        // Добавляем в массив
        myPortfolio.push({ id: id, amount: amount, investedUSD: spent });
        
        // Сохраняем в память телефона
        localStorage.setItem('userPortfolio', JSON.stringify(myPortfolio));
        
        // Очищаем форму и закрываем
        document.getElementById('coinIdInput').value = '';
        document.getElementById('coinAmountInput').value = '';
        document.getElementById('coinSpentInput').value = '';
        modal.style.display = 'none';

        // Обновляем интерфейс
        updatePortfolio();
    });

    // Первый запуск
    updatePortfolio();
</script>
</body>
</html>
